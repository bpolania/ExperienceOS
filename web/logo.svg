<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ExperienceOS">
  <!-- The seal: authority. Inside, the ledger: one memory active, one
       superseded (struck), one forgotten (redacted). Dark-background variant. -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#c8451b" stroke-width="3.25"/>
  <!-- active -->
  <line x1="21.5" y1="23" x2="42.5" y2="23" stroke="#f1eadc" stroke-width="3.25" stroke-linecap="round"/>
  <!-- superseded -->
  <line x1="21.5" y1="32" x2="42.5" y2="32" stroke="#f1eadc" stroke-width="3.25" stroke-linecap="round" opacity="0.45"/>
  <line x1="18.5" y1="34.6" x2="45.5" y2="29.4" stroke="#c8451b" stroke-width="2.9" stroke-linecap="round"/>
  <!-- forgotten -->
  <rect x="21.5" y="38.4" width="13.5" height="5.4" rx="2.7" fill="#f1eadc" opacity="0.28"/>
</svg>
